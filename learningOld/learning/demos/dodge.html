<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodge</title>
    <style>
        body {
            margin: 0;
            background: #111;
            overflow: hidden;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #0b0b0b;
        }
    </style>
</head>

<body>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const W = canvas.width;
        const H = canvas.height;

        const enemy = {
            x: W / 2,
            y: 0,
            size: 30,
            speed: 2
        };

        function update() {
            enemy.y += enemy.speed;

            if (enemy.y > H) {
                enemy.y = 0;
            }
        }

        function render() {
            ctx.fillStyle = 'red';
            ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
        }

        function loop(now) {
            console.log('test');
            //update (state)
            update();
            render();
            //render (things on screen)
            requestAnimationFrame(loop)
        }



        requestAnimationFrame(loop)
    </script>
</body>

</html>
