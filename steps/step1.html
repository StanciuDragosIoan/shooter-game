<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 1 — Draw a ship</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>

// ── Canvas setup ─────────────────────────────────────────────
// The canvas is the rectangle we draw into.
// ctx is the "pen" — every drawing command goes through it.
// W and H are the fixed logical size of our game world.

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 480;
const H = canvas.height = 700;

// ── Draw the background ──────────────────────────────────────
// fillRect(x, y, width, height) fills a rectangle.
// We cover the whole canvas with a very dark blue — space.

ctx.fillStyle = '#060616';
ctx.fillRect(0, 0, W, H);

// ── Draw the player ship ─────────────────────────────────────
// A ship is three shapes drawn on top of each other:
//   1. A blue triangle (body)
//   2. A yellow glowing ellipse (engine exhaust)
//   3. A light-blue ellipse (cockpit window)
//
// x, y is the CENTER of the ship — we use center-based positions
// throughout the game because it makes collision math cleaner.

function drawShip(x, y) {
  const w = 36, h = 40;

  // Body — triangle pointing up
  ctx.fillStyle = '#60a5fa';
  ctx.beginPath();
  ctx.moveTo(x,       y - h / 2);   // tip (top center)
  ctx.lineTo(x + w/2, y + h / 2);   // bottom-right
  ctx.lineTo(x - w/2, y + h / 2);   // bottom-left
  ctx.closePath();
  ctx.fill();

  // Engine glow — ellipse at the bottom of the ship
  // shadowBlur adds the soft glow around the shape.
  // Always reset shadowBlur to 0 after — it stays on and bleeds into everything else.
  ctx.fillStyle   = '#facc15';
  ctx.shadowColor = '#facc15';
  ctx.shadowBlur  = 10;
  ctx.beginPath();
  ctx.ellipse(x, y + h / 2, w / 7, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur  = 0;

  // Cockpit window
  ctx.fillStyle = 'rgba(190,235,255,0.75)';
  ctx.beginPath();
  ctx.ellipse(x, y - h / 6, w / 5, h / 5, 0, 0, Math.PI * 2);
  ctx.fill();
}

// Draw the ship once, near the bottom center of the canvas.
// That's it for step 1 — one static frame, no loop.
drawShip(W / 2, H - 100);

</script>
</body>
</html>
