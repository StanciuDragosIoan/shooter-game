<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 5 — Enemies</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 480;
const H = canvas.height = 700;

function drawShip(x, y) {
  const w = 36, h = 40;
  ctx.fillStyle = '#60a5fa';
  ctx.beginPath();
  ctx.moveTo(x, y - h/2); ctx.lineTo(x + w/2, y + h/2); ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#facc15'; ctx.shadowColor = '#facc15'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.ellipse(x, y + h/2, w/7, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(190,235,255,0.75)';
  ctx.beginPath(); ctx.ellipse(x, y - h/6, w/5, h/5, 0, 0, Math.PI * 2); ctx.fill();
}

const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({ x: Math.random()*W, y: Math.random()*H, speed: 0.3+Math.random()*1.2, size: Math.random()<0.85?1:2, brightness: 0.25+Math.random()*0.75 });
}

const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

const SPEED = 5, BULLET_SPEED = 12, COOLDOWN = 200;
const player = { x: W/2, y: H-100, w: 36, h: 40 };
let bullets = [], lastShot = 0;

// ── NEW: Enemies ─────────────────────────────────────────────
// An enemy is a plain object just like a bullet.
// They start above the canvas (negative y) and fly down.
// A 2D grid loop places them in evenly-spaced rows and columns.

let enemies = [];

function spawnEnemies() {
  enemies = [];
  const cols = 5, rows = 2;
  const spacingX = 80, startX = 80;
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      enemies.push({
        x: startX + col * spacingX,
        y: -40 - row * 60, // above the canvas — they fly in from the top
        w: 32, h: 28,
        speed: 1.5,
      });
    }
  }
}
spawnEnemies();

function loop() {
  const now = performance.now();

  // Player
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= SPEED;
  if (keys['ArrowRight']|| keys['KeyD']) player.x += SPEED;
  if (keys['ArrowUp']   || keys['KeyW']) player.y -= SPEED;
  if (keys['ArrowDown'] || keys['KeyS']) player.y += SPEED;
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
  player.y = Math.max(player.h/2, Math.min(H - player.h/2, player.y));

  // Shoot
  if (keys['Space'] && now - lastShot > COOLDOWN) {
    lastShot = now;
    bullets.push({ x: player.x, y: player.y - 20, dy: -BULLET_SPEED, w: 4, h: 12 });
  }

  // Move bullets
  bullets = bullets.filter(b => { b.y += b.dy; return b.y > -20; });

  // ── NEW: Move enemies ────────────────────────────────────────
  // Each enemy moves straight down. Remove it once it leaves the screen.
  for (const e of enemies) e.y += e.speed;
  enemies = enemies.filter(e => e.y < H + 40);

  // Respawn when all are gone
  if (enemies.length === 0) spawnEnemies();

  // Stars
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  // Draw
  ctx.fillStyle = '#060616';
  ctx.fillRect(0, 0, W, H);

  for (const s of stars) {
    ctx.globalAlpha = s.brightness; ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;

  drawShip(player.x, player.y);

  // Bullets
  ctx.fillStyle = '#facc15'; ctx.shadowColor = '#facc15'; ctx.shadowBlur = 8;
  for (const b of bullets) ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  ctx.shadowBlur = 0;

  // ── NEW: Draw enemies ────────────────────────────────────────
  // An inverted triangle (pointing down) with a glow and a dark eye.
  for (const e of enemies) {
    ctx.fillStyle   = '#f87171';
    ctx.shadowColor = '#f87171';
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.moveTo(e.x,         e.y + e.h / 2);   // bottom point
    ctx.lineTo(e.x + e.w/2, e.y - e.h / 2);   // top-right
    ctx.lineTo(e.x - e.w/2, e.y - e.h / 2);   // top-left
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle  = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(e.x, e.y - 2, e.w/5, e.h/6, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
