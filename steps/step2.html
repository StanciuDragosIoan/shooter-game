<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 2 — Game loop + stars</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 480;
const H = canvas.height = 700;

function drawShip(x, y) {
  const w = 36, h = 40;
  ctx.fillStyle = '#60a5fa';
  ctx.beginPath();
  ctx.moveTo(x, y - h/2); ctx.lineTo(x + w/2, y + h/2); ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#facc15'; ctx.shadowColor = '#facc15'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.ellipse(x, y + h/2, w/7, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(190,235,255,0.75)';
  ctx.beginPath(); ctx.ellipse(x, y - h/6, w/5, h/5, 0, 0, Math.PI * 2); ctx.fill();
}

// ── NEW: Stars ────────────────────────────────────────────────
// Each star is a plain object with a position, speed, size and brightness.
// Speed varies so near stars scroll faster than far ones — parallax.

const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x:          Math.random() * W,
    y:          Math.random() * H,
    speed:      0.3 + Math.random() * 1.2,
    size:       Math.random() < 0.85 ? 1 : 2,
    brightness: 0.25 + Math.random() * 0.75,
  });
}

// Ship stays still for now — just a fixed position.
const player = { x: W / 2, y: H - 100 };

// ── NEW: The game loop ────────────────────────────────────────
// requestAnimationFrame calls loop before the browser paints each frame.
// That's ~60 times per second. Each call:
//   1. Updates everything (move stars)
//   2. Redraws everything from scratch
//   3. Schedules the next call

function loop() {

  // UPDATE — move stars down. Wrap to top when they exit the bottom.
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  // DRAW — wipe the canvas first, then repaint everything.
  // The canvas remembers nothing between frames — you repaint everything every time.
  ctx.fillStyle = '#060616';
  ctx.fillRect(0, 0, W, H);

  for (const s of stars) {
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle   = '#fff';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;

  drawShip(player.x, player.y);

  requestAnimationFrame(loop); // schedule the next frame
}

requestAnimationFrame(loop); // kick off the first frame

</script>
</body>
</html>
