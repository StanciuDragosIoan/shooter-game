<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 4 — Bullets</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 480;
const H = canvas.height = 700;

function drawShip(x, y) {
  const w = 36, h = 40;
  ctx.fillStyle = '#60a5fa';
  ctx.beginPath();
  ctx.moveTo(x, y - h/2); ctx.lineTo(x + w/2, y + h/2); ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#facc15'; ctx.shadowColor = '#facc15'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.ellipse(x, y + h/2, w/7, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(190,235,255,0.75)';
  ctx.beginPath(); ctx.ellipse(x, y - h/6, w/5, h/5, 0, 0, Math.PI * 2); ctx.fill();
}

const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({ x: Math.random()*W, y: Math.random()*H, speed: 0.3+Math.random()*1.2, size: Math.random()<0.85?1:2, brightness: 0.25+Math.random()*0.75 });
}

const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

const SPEED        = 5;
const BULLET_SPEED = 12;
const COOLDOWN     = 200; // ms — minimum gap between shots

const player = { x: W / 2, y: H - 100, w: 36, h: 40 };

// ── NEW: Bullets ─────────────────────────────────────────────
// An array of plain objects. Each bullet has a position and size.
// dy is negative so it moves upward (canvas Y increases downward).

let bullets  = [];
let lastShot = 0; // timestamp of the last shot fired

function loop() {
  const now = performance.now(); // current time in ms

  // Player movement
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= SPEED;
  if (keys['ArrowRight']|| keys['KeyD']) player.x += SPEED;
  if (keys['ArrowUp']   || keys['KeyW']) player.y -= SPEED;
  if (keys['ArrowDown'] || keys['KeyS']) player.y += SPEED;
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
  player.y = Math.max(player.h/2, Math.min(H - player.h/2, player.y));

  // ── NEW: Shoot ───────────────────────────────────────────────
  // Only fire if Space is held AND enough time has passed since the last shot.
  // lastShot is the cooldown pattern — no timer, just a timestamp comparison.
  if (keys['Space'] && now - lastShot > COOLDOWN) {
    lastShot = now;
    // Bullet spawns at the tip of the ship (y - h/2).
    // x and y are the CENTER of the bullet — consistent with everything else.
    bullets.push({ x: player.x, y: player.y - 20, dy: -BULLET_SPEED, w: 4, h: 12 });
  }

  // ── NEW: Move bullets + remove off-screen ones ───────────────
  // filter() replaces the array with only the items that return true.
  // Returning false removes the bullet — no splice, no index tracking.
  bullets = bullets.filter(b => {
    b.y += b.dy;
    return b.y > -20; // keep bullets that are still on screen
  });

  // Stars
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  // Draw
  ctx.fillStyle = '#060616';
  ctx.fillRect(0, 0, W, H);

  for (const s of stars) {
    ctx.globalAlpha = s.brightness; ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;

  drawShip(player.x, player.y);

  // ── NEW: Draw bullets ────────────────────────────────────────
  // fillRect expects top-left corner, but our x/y is center.
  // So we shift: b.x - b.w/2 gives the left edge.
  ctx.fillStyle   = '#facc15';
  ctx.shadowColor = '#facc15';
  ctx.shadowBlur  = 8;
  for (const b of bullets) ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  ctx.shadowBlur  = 0;

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
