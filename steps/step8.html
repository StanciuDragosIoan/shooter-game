<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 8 — Lives, screens, sound</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 480;
const H = canvas.height = 700;

function drawShip(x, y) {
  const w = 36, h = 40;
  ctx.fillStyle = '#60a5fa';
  ctx.beginPath();
  ctx.moveTo(x, y - h/2); ctx.lineTo(x + w/2, y + h/2); ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#facc15'; ctx.shadowColor = '#facc15'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.ellipse(x, y + h/2, w/7, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(190,235,255,0.75)';
  ctx.beginPath(); ctx.ellipse(x, y - h/6, w/5, h/5, 0, 0, Math.PI * 2); ctx.fill();
}

const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({ x: Math.random()*W, y: Math.random()*H, speed: 0.3+Math.random()*1.2, size: Math.random()<0.85?1:2, brightness: 0.25+Math.random()*0.75 });
}

function hits(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
         Math.abs(a.y - b.y) < (a.h + b.h) / 2;
}

let particles = [];
function explode(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI * 2 * i) / 10 + Math.random() * 0.5;
    const speed = 1 + Math.random() * 3;
    particles.push({ x, y, dx: Math.cos(angle)*speed, dy: Math.sin(angle)*speed, life: 1, decay: 0.025+Math.random()*0.02, size: 2+Math.random()*3, color });
  }
}

// ── NEW: Sound effects ────────────────────────────────────────
// The Web Audio API generates sound from math — no audio files.
// getAudio() lazily creates the AudioContext (browsers block audio until
// the user interacts with the page — a key press counts as an interaction).

let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function sndShoot() {
  const ac = getAudio(), o = ac.createOscillator(), g = ac.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(900, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, ac.currentTime + 0.09); // pitch drops = "pew"
  g.gain.setValueAtTime(0.15, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.09);    // fade out
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + 0.09);
}

function sndExplosion() {
  const ac = getAudio();
  const buf = ac.createBuffer(1, ac.sampleRate * 0.3, ac.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; // white noise
  const src = ac.createBufferSource(), filt = ac.createBiquadFilter(), g = ac.createGain();
  src.buffer = buf; filt.type = 'lowpass'; filt.frequency.value = 800; // low rumble
  g.gain.setValueAtTime(0.3, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime + 0.3);
}

function sndGameOver() {
  const ac = getAudio();
  [440, 349, 294, 220].forEach((freq, i) => { // descending notes A F D A
    const o = ac.createOscillator(), g = ac.createGain();
    const t = ac.currentTime + i * 0.22;       // stagger each note
    o.type = 'sawtooth'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.32);
  });
}

// ── NEW: Game state ───────────────────────────────────────────
// 'start'    — title screen, waiting for Space
// 'playing'  — game is running
// 'gameover' — player ran out of lives

let gameState = 'start';
let score = 0, wave = 1, lastShot = 0;

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  getAudio(); // wake AudioContext on first key press
  if (e.code === 'Space') e.preventDefault();
  // Space or Enter on a non-playing screen starts the game
  if ((e.code === 'Space' || e.code === 'Enter') && gameState !== 'playing') startGame();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

const SPEED = 5, BULLET_SPEED = 12, COOLDOWN = 200, WAVE_PAUSE = 2000;
let player, bullets, enemyBullets, enemies, waveTimer, waveDone;

function createPlayer() {
  return { x: W/2, y: H-100, w: 36, h: 40, lives: 3, invincible: 0 };
}

function spawnEnemies(waveNum) {
  enemies  = [];
  waveDone = false;
  const cols = Math.min(4 + waveNum, 8), rows = Math.min(1 + Math.floor(waveNum / 2), 4);
  const spacing = Math.min((W - 60) / cols, 54);
  const startX  = (W - (cols - 1) * spacing) / 2;
  for (let row = 0; row < rows; row++)
    for (let col = 0; col < cols; col++)
      enemies.push({ x: startX + col*spacing, y: -40 - row*60, w: 32, h: 28, speed: 1.4 + waveNum*0.1 });
}

function startGame() {
  gameState    = 'playing';
  score        = 0;
  wave         = 1;
  player       = createPlayer();
  bullets      = [];
  enemyBullets = [];
  particles    = [];
  waveDone     = false;
  // Re-scatter stars so they look fresh
  stars.forEach(s => { s.y = Math.random() * H; });
  spawnEnemies(wave);
}

// ── NEW: Hurt player ──────────────────────────────────────────
// Invincibility frames prevent losing all lives in a single enemy spray.
// After a hit, player.invincible counts down. While > 0, hits are ignored.
// The ship blinks visually to signal the mercy window.

function hurtPlayer() {
  if (player.invincible > 0) return;
  player.lives--;
  player.invincible = 2200; // ~2 seconds of mercy
  explode(player.x, player.y, '#60a5fa');
  if (player.lives <= 0) {
    gameState = 'gameover';
    sndGameOver();
  }
}

function loop(now) {
  const dt = 16; // simplified — not using real delta time in the steps

  if (gameState === 'playing') {

    // Stars
    for (const s of stars) {
      s.y += s.speed;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    }

    // Player
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= SPEED;
    if (keys['ArrowRight']|| keys['KeyD']) player.x += SPEED;
    if (keys['ArrowUp']   || keys['KeyW']) player.y -= SPEED;
    if (keys['ArrowDown'] || keys['KeyS']) player.y += SPEED;
    player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
    player.y = Math.max(player.h/2, Math.min(H - player.h/2, player.y));

    if (keys['Space'] && now - lastShot > COOLDOWN) {
      lastShot = now; sndShoot();
      bullets.push({ x: player.x, y: player.y - 20, dy: -BULLET_SPEED, w: 4, h: 12 });
    }

    if (player.invincible > 0) player.invincible -= dt;

    // Bullets + collision
    bullets = bullets.filter(b => {
      b.y += b.dy;
      if (b.y < -20) return false;
      for (let i = enemies.length - 1; i >= 0; i--) {
        if (hits(b, enemies[i])) {
          score += 100;
          explode(enemies[i].x, enemies[i].y, '#f87171');
          sndExplosion();
          enemies.splice(i, 1);
          return false;
        }
      }
      return true;
    });

    // Enemies
    for (const e of enemies) e.y += e.speed;
    enemies = enemies.filter(e => e.y < H + 40);

    // ── NEW: Enemy bullets ────────────────────────────────────
    // Enemies occasionally fire a bullet straight down.
    for (const e of enemies) {
      if (Math.random() < 0.0012) {
        enemyBullets.push({ x: e.x, y: e.y + e.h/2, dy: 3.5, w: 5, h: 10 });
      }
    }
    enemyBullets = enemyBullets.filter(b => {
      b.y += b.dy;
      if (hits(b, player)) { hurtPlayer(); return false; }
      return b.y < H + 20;
    });

    // Particles
    particles = particles.filter(p => {
      p.x += p.dx; p.y += p.dy; p.dx *= 0.96; p.dy *= 0.96; p.life -= p.decay; return p.life > 0;
    });

    // Wave progression
    if (enemies.length === 0 && !waveDone) { waveDone = true; waveTimer = now; }
    if (waveDone && now - waveTimer > WAVE_PAUSE) { wave++; spawnEnemies(wave); }
  }

  // ── DRAW ─────────────────────────────────────────────────────

  ctx.fillStyle = '#060616';
  ctx.fillRect(0, 0, W, H);

  // Stars (drawn on all screens)
  for (const s of stars) {
    ctx.globalAlpha = s.brightness; ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;

  // ── NEW: Start screen ─────────────────────────────────────────
  if (gameState === 'start') {
    drawShip(W/2, H/2 - 30, 52, 60);
    ctx.fillStyle = '#60a5fa'; ctx.font = 'bold 44px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#60a5fa'; ctx.shadowBlur = 20;
    ctx.fillText('SKY ASSAULT', W/2, H/2 - 120);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#c4c4e0'; ctx.font = '15px Courier New';
    ctx.fillText('MOVE :  Arrow Keys / WASD', W/2, H/2 + 55);
    ctx.fillText('SHOOT:  Space',             W/2, H/2 + 79);
    // Math.floor(now / 600) % 2 toggles 0/1 every 600ms — the blink
    if (Math.floor(now / 600) % 2) {
      ctx.fillStyle = '#facc15'; ctx.font = 'bold 17px Courier New';
      ctx.fillText('PRESS SPACE TO START', W/2, H/2 + 122);
    }
    return;
  }

  // ── NEW: Game over screen ─────────────────────────────────────
  if (gameState === 'gameover') {
    // Let the explosion particles finish playing out
    for (const p of particles) {
      ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#f43f5e'; ctx.font = 'bold 50px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#f43f5e'; ctx.shadowBlur = 22;
    ctx.fillText('GAME OVER', W/2, H/2 - 60);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#c4c4e0'; ctx.font = '20px Courier New';
    ctx.fillText(`SCORE : ${score}`, W/2, H/2);
    if (Math.floor(now / 600) % 2) {
      ctx.fillStyle = '#facc15'; ctx.font = 'bold 15px Courier New';
      ctx.fillText('PRESS SPACE TO PLAY AGAIN', W/2, H/2 + 70);
    }
    return;
  }

  // Playing
  // Player blinks while invincible: show on even 100ms intervals
  if (player.invincible <= 0 || Math.floor(now / 100) % 2 === 0) {
    drawShip(player.x, player.y);
  }

  ctx.fillStyle = '#facc15'; ctx.shadowColor = '#facc15'; ctx.shadowBlur = 8;
  for (const b of bullets) ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#f87171'; ctx.shadowColor = '#f43f5e'; ctx.shadowBlur = 6;
  for (const b of enemyBullets) ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  ctx.shadowBlur = 0;

  for (const e of enemies) {
    ctx.fillStyle = '#f87171'; ctx.shadowColor = '#f87171'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(e.x, e.y + e.h/2); ctx.lineTo(e.x + e.w/2, e.y - e.h/2); ctx.lineTo(e.x - e.w/2, e.y - e.h/2);
    ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(e.x, e.y - 2, e.w/5, e.h/6, 0, 0, Math.PI * 2); ctx.fill();
  }

  for (const p of particles) {
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // HUD
  ctx.fillStyle = '#c4c4e0'; ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(`SCORE  ${score}`, 12, 12);
  ctx.textAlign = 'center';
  ctx.fillText(`WAVE ${wave}`, W/2, 12);
  for (let i = 0; i < player.lives; i++) drawShip(18 + i*30, H - 22, 16, 18);

  // Wave-clear banner
  if (waveDone) {
    const el = now - waveTimer;
    const alpha = Math.min(1, el / 300) * (1 - el / WAVE_PAUSE);
    if (alpha > 0) {
      ctx.globalAlpha = alpha; ctx.fillStyle = '#facc15';
      ctx.font = 'bold 34px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = '#facc15'; ctx.shadowBlur = 16;
      ctx.fillText('WAVE CLEAR!', W/2, H/2);
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
  }

  requestAnimationFrame(loop);
}

// drawShip is called with 3 args in HUD (small lives icons), update the function signature
// to optionally accept w/h so both uses work cleanly
const _drawShip = drawShip;
function drawShip(x, y, w = 36, h = 40) {
  ctx.fillStyle = '#60a5fa';
  ctx.beginPath();
  ctx.moveTo(x, y - h/2); ctx.lineTo(x + w/2, y + h/2); ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#facc15'; ctx.shadowColor = '#facc15'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.ellipse(x, y + h/2, w/7, 7*(h/40), 0, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(190,235,255,0.75)';
  ctx.beginPath(); ctx.ellipse(x, y - h/6, w/5, h/5, 0, 0, Math.PI * 2); ctx.fill();
}

// Boot: scatter stars, then start the loop on the title screen
stars.forEach(s => { s.y = Math.random() * H; });
requestAnimationFrame(loop);

</script>
</body>
</html>
