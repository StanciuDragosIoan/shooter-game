<canvas id="c" width="500" height="300"></canvas>

<script>
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  // object A (moving)
  const a = {
    x: 50,
    y: 150,
    w: 40,
    h: 40,
    dx: 2
  };

  // object B (stationary)
  const b = {
    x: 300,
    y: 150,
    w: 60,
    h: 60
  };

  // collision function (same as your snippet)
  function hits(a, b) {
    return Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
      Math.abs(a.y - b.y) < (a.h + b.h) / 2;
  }

  function update() {
    a.x += a.dx;

    // reset when it goes off screen
    if (a.x > canvas.width + 50) {
      a.x = -50;
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const collision = hits(a, b);

    // draw A
    ctx.fillStyle = collision ? "red" : "blue";
    ctx.fillRect(a.x - a.w / 2, a.y - a.h / 2, a.w, a.h);

    // draw B
    ctx.fillStyle = "green";
    ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);

    // text
    ctx.fillStyle = "black";
    ctx.fillText(collision ? "HIT!" : "no collision", 10, 20);
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  loop();
</script>
