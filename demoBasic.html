<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Assault — Basic</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="game"></canvas>
    <script>
        let gameState = 'playing';

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = canvas.width = 480;
        const H = canvas.height = 700;

        let lastTime = 0;
        let frame = 0;

        // store debug lines to display
        let debugLines = [];

        function log(line) {
            debugLines.push(line);
            if (debugLines.length > 8) debugLines.shift(); // keep last 8 lines
        }

        function draw(now) {
            log(`→ draw(now: ${now.toFixed(2)})`);

            ctx.clearRect(0, 0, W, H);

            ctx.fillStyle = "lime";
            ctx.font = "16px Courier New";

            debugLines.forEach((line, i) => {
                ctx.fillText(line, 10, 30 + i * 20);
            });
        }

        function update(dt, now) {
            log(`→ update(dt: ${dt.toFixed(2)})`);
        }

        function loop(now) {
            log(`FRAME ${frame}`);

            const dt = Math.min(now - lastTime, 50);
            lastTime = now;

            log(`loop(now: ${now.toFixed(2)})`);

            if (gameState === 'playing') {
                update(dt, now);
            }

            draw(now);

            frame++;

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
